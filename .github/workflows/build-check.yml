name: Build Check

on:
  push:
    paths:
      - '.build-ready'   # Only trigger when QA writes this sentinel file

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        id: typecheck
        run: npx tsc --noEmit 2>&1 | tee /tmp/tsc_output.txt; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Build
        id: build
        run: npm run build 2>&1 | tee /tmp/build_output.txt; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Post result to n8n
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          PASSED=false
          if [ "$JOB_STATUS" = "success" ]; then PASSED=true; fi
          TSC_ERRORS=$(cat /tmp/tsc_output.txt 2>/dev/null | tail -80 || echo "")
          BUILD_ERRORS=$(cat /tmp/build_output.txt 2>/dev/null | tail -80 || echo "")
          curl -X POST "https://liamdegand.app.n8n.cloud/webhook/build-result" \
            -H "Content-Type: application/json" \
            -d "{
              \"project_id\": \"${{ github.event.repository.name }}\",
              \"passed\": $PASSED,
              \"status\": \"$JOB_STATUS\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"tsc_errors\": $(echo "$TSC_ERRORS" | jq -Rs .),
              \"build_errors\": $(echo "$BUILD_ERRORS" | jq -Rs .)
            }"